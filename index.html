<!DOCTYPE html>
<html>
<head>
    <title>Prueba</title>

    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.4/dist/aframe-environment-component.min.js"></script>
</head>

<body>
<a-scene background="color: #87CEEB">

    <a-assets>
        <img id="cielo" src="cielo.jpg">
        <img id="groundTexture" src="piso.jpg">

        <audio id="musica" src="harry.mp3"></audio>

        <a-asset-item id="villa" src="villa.gltf"></a-asset-item>
    </a-assets>

    <!-- Iluminación -->
    <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
    <a-light type="directional" color="#ffffff" intensity="1" position="5 10 5"></a-light>

    <a-sky src="#cielo"></a-sky>

    <a-plane
        geometry="primitive: plane; width: 1000; height: 1000"
        material="src: #groundTexture; repeat: 200 200"
        rotation="-90 0 0"
        position="0 0 0">
    </a-plane>

    <a-camera position="0 1.6 0">
        <a-cursor></a-cursor>
    </a-camera>

    <a-entity
        gltf-model="#villa"
        position="0 0 -35"
        scale="5 5 5"
        sound="src: #musica; on: click">
    </a-entity>

    <a-text
        value="TU MIRADA ES TAN DULCE QUE VOY A MORIR DE DIABETES. KAREN NOLASCO :3"
        color="#c418ad"
        position="-15 3 -45"
        scale="4 4 4"
        align="center">
    </a-text>

    <a-entity
        environment="preset: none; dressing: snow; dressingAmount: 100; dressingColor: #ffffff; dressingScale: 1"
        position="0 0 0">
    </a-entity>

</a-scene>
</body>
</html>
