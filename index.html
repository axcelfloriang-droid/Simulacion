<!DOCTYPE html>
<html>
<head>
    <title>Prueba</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.0.x/dist/aframe-particle-system-component.min.js"></script>
</head>

<body>
<a-scene>
    <a-assets>
        <img id="cielo" src="cielo.jpg">
        <img id="groundTexture" src="azul.png">		
        <audio id="musica" src="harry.mp3"></audio>
        <a-asset-item id="villa" src="villa.gltf"></a-asset-item>

        <img id="snowflake" src="https://i.imgur.com/8N69v9V.png">
    </a-assets>

    <a-sky src="#cielo"></a-sky>

    <a-plane src="#groundTexture" rotation="-90 0 0" height="100" width="100" position="0 0 0"></a-plane>

    <a-camera position="0 1.6 58">
        <a-cursor></a-cursor>
    </a-camera>

    <a-entity gltf-model="#villa" position="0 0 35" scale="1 1 1" sound="src: #musica; on: click; volume: 10; refDistance: 4; rolloffFactor: 4"></a-entity>

    <a-text value="TU MIRADA ES TAN DULCE QUE VOY A MORIR DE DIABETES. KAREN NOLASCO :3" color="#c418ad" position="-15 3 45" scale="4 4 4" align="center"></a-text>

    <a-entity particle-system="preset: snow; 
                                particleCount: 6000; 
                                size: 2.0; 
                                texture: #snowflake; 
                                color: #FFFFFF; 
                                velocityValue: 0 -3 0; 
                                position: 0 15 50; 
                                area: 50 20 50">
    </a-entity>

</a-scene>
</body>
</html>
